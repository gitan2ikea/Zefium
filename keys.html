<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keys - Zefium Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🔥 ZEFIUM HUB</div>
            <button class="nav-toggle" id="navToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">HOME</a></li>
                <li><a href="scripts.html">SCRIPTS</a></li>
                <li><a href="keys.html" class="active">KEYS</a></li>
            </ul>
        </div>
    </nav>

    <!-- Keys Section -->
    <section class="keys-section">
        <h1 class="section-title">DÉVERROUILLEZ VOS CLÉS</h1>
        <div class="games-grid" id="gamesGrid">
            <!-- Les jeux seront chargés par JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 Zefium Hub. Tous droits réservés.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        const games = [
            { name: 'Blox Fruits', icon: '🍎', color: '#FF6B35', keyId: 1 },
            { name: 'Speed Simulator', icon: '🏃', color: '#FF8C42', keyId: 2 },
            { name: 'Clicker Tycoon', icon: '💰', color: '#FFB340', keyId: 3 },
            { name: 'Prison Life', icon: '🔐', color: '#FFA630', keyId: 4 },
            { name: 'Build a Boat', icon: '🚤', color: '#FF7F50', keyId: 5 },
            { name: 'Mining Simulator', icon: '⛏️', color: '#FF9500', keyId: 6 },
            { name: 'Combat Warriors', icon: '⚔️', color: '#FF6347', keyId: 7 },
            { name: 'Jailbreak', icon: '🚗', color: '#FF8C00', keyId: 8 },
            { name: 'Adopt Me', icon: '🐶', color: '#FFA07A', keyId: 9 },
            { name: 'Tower of Hell', icon: '🏢', color: '#FF7F50', keyId: 10 },
            { name: 'Brookhaven', icon: '🏠', color: '#FF6B6B', keyId: 11 },
            { name: 'Royale High', icon: '👑', color: '#FF69B4', keyId: 12 }
        ];

        const grid = document.getElementById('gamesGrid');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.style.borderTopColor = game.color;
            card.innerHTML = `
                <div class="game-card-inner">
                    <div class="game-icon">${game.icon}</div>
                    <h3>${game.name}</h3>
                    <button class="unlock-btn" onclick="unlockKey('${game.name}', ${game.keyId})">DÉVERROUILLER</button>
                </div>
            `;
            grid.appendChild(card);
        });

        function unlockKey(gameName, keyId) {
            // La clé statique pour ce jeu
            const key = `Zefium${keyId}`;
            
            // Ouvrir Linkvertise dans une nouvelle fenêtre
            const linkvertiseUrl = 'https://linkvertise.com/';
            
            // Créer une nouvelle fenêtre
            const newWindow = window.open(linkvertiseUrl, '_blank', 'width=800,height=600');
            
            // Vérifier si la fenêtre a été fermée
            let checkClosed = setInterval(() => {
                if (newWindow && newWindow.closed) {
                    clearInterval(checkClosed);
                    
                    // Redirection avec la clé dans l'URL
                    const gameLink = getGameLink(gameName);
                    if (gameLink) {
                        window.open(`${gameLink}?key=${key}`, '_blank');
                    }
                    
                    // Afficher une notification avec la clé
                    showKeyNotification(key, gameName);
                }
            }, 500);
        }

        function getGameLink(gameName) {
            const links = {
                'Blox Fruits': 'https://www.roblox.com/games/2753915549',
                'Speed Simulator': 'https://www.roblox.com/games/3624418149',
                'Clicker Tycoon': 'https://www.roblox.com/games/5346789551',
                'Prison Life': 'https://www.roblox.com/games/41157023',
                'Build a Boat': 'https://www.roblox.com/games/1311225089',
                'Mining Simulator': 'https://www.roblox.com/games/3720677267',
                'Combat Warriors': 'https://www.roblox.com/games/10449761463',
                'Jailbreak': 'https://www.roblox.com/games/606849621',
                'Adopt Me': 'https://www.roblox.com/games/920587237',
                'Tower of Hell': 'https://www.roblox.com/games/1220701524',
                'Brookhaven': 'https://www.roblox.com/games/5513172899',
                'Royale High': 'https://www.roblox.com/games/2414198484'
            };
            return links[gameName] || null;
        }

        function showKeyNotification(key, gameName) {
            const notification = document.createElement('div');
            notification.className = 'key-notification';
            notification.innerHTML = `
                <div class="notification-content">
                    <h3>Clé Déverrouillée! 🎉</h3>
                    <p><strong>${gameName}</strong></p>
                    <div class="key-box">
                        <code>${key}</code>
                        <button onclick="copyKey('${key}')">📋 COPIER</button>
                    </div>
                    <p class="key-warning">Clé copiée! Elle a été automatiquement envoyée au jeu.</p>
                </div>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 5000);
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            alert('Clé copiée: ' + key);
        }
    </script>
</body>
</html>
